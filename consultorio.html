<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Formulário com vários tipos de campos</title>
  <h1> Consultório odontológico</h1>
  <style>
    h1 {
      text-align: center;
    }
    form {
      width: 350px;
      margin: 30px auto;
      font-family: Arial, sans-serif;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 7px;
      margin-top: 5px;
      box-sizing: border-box;
      border: 1px solid #aaa;
      border-radius: 4px;
    }
    .inline {
      display: inline-block;
      width: auto;
      margin-right: 10px;
      font-weight: normal;
    }
    .buttons {
      margin-top: 20px;
    }
    button, input[type="submit"] {
      padding: 10px 15px;
      margin-right: 10px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    input[type="submit"] {
      background-color: #28a745;
      color: white;
    }
    button {
      background-color: #007bff;
      color: white;
    }
    button:hover, input[type="submit"]:hover {
      opacity: 0.9;
    }
    body{
      border: 2px solid black;
      background-color: #18FFFF;
    }
  </style>
</head>
<body>

  <form>
    <label for="text">Texto:</label>
    <input type="text" id="text" name="text" placeholder="Digite um texto" />

    <label for="number">Número:</label>
    <input type="number" id="number" name="number" min="0" max="100" />

    <label for="date">Data:</label>
    <input type="date" id="date" name="date" />

    <label for="datetime">Data e Hora:</label>
    <input type="datetime-local" id="datetime" name="datetime" />

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" placeholder="seuemail@email.com" />

    <input type="hidden" name="hiddenField" value="valorEscondido" />

    <label for="password">Senha:</label>
    <input type="password" id="password" name="password" />

    <label for="tel">Telefone:</label>
    <input type="tel" id="tel" name="tel" placeholder="(xx) xxxx-xxxx" pattern="[0-9\s\-()+]+" />

    <label>Problemas:</label>
    <label class="inline"><input type="checkbox" name="Problemas" value="Alérgico" /> Alérgico</label>
    <label class="inline"><input type="checkbox" name="interesse" value="Sobrepeso" /> Sobrepeso</label>
    <label class="inline"><input type="checkbox" name="interesse" value="Outros" /> Outros</label>

    <label>Sexo:</label>
    <label class="inline"><input type="radio" name="sexo" value="masculino" /> Masculino</label>
    <label class="inline"><input type="radio" name="sexo" value="feminino" /> Feminino</label>
    <label class="inline"><input type="radio" name="sexo" value="outro" /> Outro</label>

    <label for="cor">Cor favorita:</label>
    <input type="color" id="cor" name="cor" value="#0000ff" />

    <div class="buttons">
      <input type="submit" value="Enviar" />
      
    </div>
  </form>

</body>
</html>
