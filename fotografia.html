<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio - Douglas Matos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style1.css">
    <style>
        body {
            background-color: #f4f4f4;
            color: #333;
        }
        .portfolio-section {
            background-color: #fff;
            padding: 30px;
            margin-bottom: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .portfolio-section h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }
        .carousel-item img {
            max-height: 550px;
            object-fit: cover;
            width: 100%;
            border-radius: 5px;
        }
        .audio-player {
            text-align: center;
            margin-top: 20px;
        }
        .container h1 {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Portfólio Fotográfico de Douglas Matos</h1>

        <section class="portfolio-section" id="formaturas">
            <h2>Formaturas</h2>
            <div id="carouselFormaturas" class="carousel slide" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="Formatura/1.jpg" class="d-block w-100" alt="Foto Formatura 1">
                    </div>
                    <div class="carousel-item">
                        <img src="Formatura/2.jpg" class="d-block w-100" alt="Foto Formatura 2">
                    </div>
                    <div class="carousel-item">
                        <img src="Formatura/3.jpg" class="d-block w-100" alt="Foto Formatura 3">
                    </div>
                    <div class="carousel-item">
                        <img src="Formatura/4.jpg" class="d-block w-100" alt="Foto Formatura 4">
                    </div>
                    <div class="carousel-item">
                        <img src="Formatura/5.jpg" class="d-block w-100" alt="Foto Formatura 5">
                    </div>
                    <div class="carousel-item">
                        <img src="Formatura/6.jpg" class="d-block w-100" alt="Foto Formatura 6">
                    </div>
                    <div class="carousel-item">
                        <img src="Formatura/7.jpg" class="d-block w-100" alt="Foto Formatura 7">
                    </div>
                    <div class="carousel-item">
                        <img src="Formatura/8.jpg" class="d-block w-100" alt="Foto Formatura 8">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselFormaturas" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Anterior</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselFormaturas" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Próximo</span>
                </button>
            </div>
            <div class="audio-player">
                <audio controls>
                    <source src="audio_placeholder.mp3" type="audio/mpeg">
                    Seu navegador não suporta o elemento de áudio.
                </audio>
            </div>
        </section>
