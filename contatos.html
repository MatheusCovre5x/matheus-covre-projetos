<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatos - Matheus Covre</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

      
        .contact-card {
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 400px; 
            width: 100%;
            text-align: center;
            border-top: 5px solid #007bff;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 1.8rem;
            color: #1a1a1a;
        }

        
        .linkedin-btn {
            display: inline-block; 
            background-color: #0077b5; 
            color: white;
            text-decoration: none; 
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.3s ease; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        
        .linkedin-btn:hover {
            background-color: #005582; 
            transform: translateY(-2px); 
        }
        
        p {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="contact-card">
        <h2>Contatos</h2>
        
        <p>
            <a href="https://www.linkedin.com/in/matheus-covre-744520365/" target="_blank" class="linkedin-btn">
                Acesse meu LinkedIn
            </a>
        </p>
    </div>

</body>
</html>
