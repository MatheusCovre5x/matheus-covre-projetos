<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Matheus Covre</title>
    <style>
        /* 1. Reset básico e Fonte Moderna */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Fonte moderna do sistema (san-serif) */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5; /* Cinza bem claro, padrão moderno */
            color: #333;
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center;     /* Centraliza verticalmente */
            height: 100vh;           /* Altura total da tela */
            padding: 20px;
        }

        /* 2. O estilo do "Cartão" */
        .profile-card {
            background-color: white;
            padding: 40px;
            border-radius: 16px; /* Bordas arredondadas */
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); /* Sombra suave para dar profundidade */
            max-width: 600px;
            text-align: center;
            border-top: 5px solid #007bff; /* Detalhe colorido no topo (azul tech) */
        }

        /* 3. Tipografia */
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #1a1a1a;
        }

        .role {
            color: #007bff; /* Azul para destacar o curso */
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6; /* Espaçamento entre linhas para facilitar leitura */
            color: #555;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>Olá, sou Matheus Covre</h1>
        <div class="role">Estudante de Análise e Des. de Sistemas (CEUB)</div>
        <p>
            Estou no 2º semestre e sou apaixonado por computação. 
            Meu objetivo é utilizar a tecnologia para resolver problemas reais de forma eficiente.
        </p>
    </div>

</body>
</html>
